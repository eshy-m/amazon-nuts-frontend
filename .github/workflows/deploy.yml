name: 🚀 Desplegar Angular en Hostinger

on:
  push:
    branches:
      - main # O la rama que uses como principal (puede ser 'master')

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar dependencias
        run: npm install

      - name: 🏗️ Compilar Angular
        run: npm run build

      - name: 🌐 Subir a Hostinger por FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # REVISA ESTA LÍNEA (ver nota abajo)
          local-dir: ./dist/amazon-nuts/browser/ 
          server-dir: /public_html/