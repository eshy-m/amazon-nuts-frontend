name: Despliegue Backend Amazon Nuts

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Obtener código
        uses: actions/checkout@v3

      - name: 🚀 Subir a Hostinger vía FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./ 
          # 👇 CORRECCIÓN: Le quitamos el "public_html/" ara evitar el clon
          server-dir: /public_html/backend/
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/**
            **/vendor/**
            .env
            storage/*.log