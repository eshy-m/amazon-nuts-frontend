<div class="w-full">
    <div class="flex items-center justify-between mb-8 no-print">
        <div>
            <h1 class="text-2xl font-black text-gray-800 tracking-tight">Control de Personal</h1>
            <p class="text-sm text-gray-500 mt-1">Registro de trabajadores y generación de Fotochecks QR</p>
        </div>
        <button (click)="imprimir()"
            class="bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded-lg font-bold shadow-sm transition-colors flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2z">
                </path>
            </svg>
            Imprimir Fotochecks
        </button>
    </div>

    <form (ngSubmit)="guardar()" class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-8 no-print">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Nombres *</label>
                <input type="text" [(ngModel)]="form.nombres" name="nombres" required
                    class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-gray-800 focus:border-gray-800 transition-colors">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Apellidos *</label>
                <input type="text" [(ngModel)]="form.apellidos" name="apellidos" required
                    class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-gray-800 focus:border-gray-800 transition-colors">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">DNI *</label>
                <input type="text" maxlength="8" [(ngModel)]="form.dni" name="dni" required placeholder="8 dígitos"
                    class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-gray-800 focus:border-gray-800 transition-colors">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">N° Celular</label>
                <input type="text" maxlength="15" [(ngModel)]="form.celular" name="celular" placeholder="Ej: 987654321"
                    class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-gray-800 focus:border-gray-800 transition-colors">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Área Asignada *</label>
                <select [(ngModel)]="form.area" name="area" required
                    class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-gray-800 focus:border-gray-800 transition-colors">
                    <option value="" disabled selected>Selecciona...</option>
                    <option value="Selección">Selección</option>
                    <option value="Producción">Producción</option>
                    <option value="Promotor">Promotor</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Fecha Inicio</label>
                <input type="date" [(ngModel)]="form.fecha_inicio" name="fecha_inicio"
                    class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-gray-800 focus:border-gray-800 transition-colors">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">¿Experiencia?</label>
                <select [(ngModel)]="form.experiencia" name="experiencia"
                    class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-gray-800 focus:border-gray-800 transition-colors">
                    <option [ngValue]="false">No</option>
                    <option [ngValue]="true">Sí</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Dirección</label>
                <input type="text" [(ngModel)]="form.direccion" name="direccion"
                    class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-gray-800 focus:border-gray-800 transition-colors">
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-bold text-gray-700 mb-1">Observaciones (Opcional)</label>
            <textarea [(ngModel)]="form.observaciones" name="observaciones" rows="2"
                class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-gray-800 focus:border-gray-800 transition-colors"></textarea>
        </div>

        <div class="flex justify-end">
            <button type="submit"
                class="bg-green-700 hover:bg-green-800 text-white px-8 py-3 rounded-lg font-bold shadow-md transition-all flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                Registrar Trabajador
            </button>
        </div>
    </form>

    <div class="print-container">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

            <div *ngFor="let t of lista" class="fotocheck-wrapper">

                <div
                    class="print-card w-full max-w-[280px] h-[400px] mx-auto bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden flex flex-col relative">
                    <div class="bg-gray-50 border-b-[3px] border-green-700 p-3 flex justify-center items-center h-16">
                        <span class="font-black text-lg tracking-widest text-green-900">AMAZON NUTS</span>
                    </div>

                    <div class="flex flex-col items-center pt-4 px-4 flex-grow">
                        <div
                            class="w-16 h-16 rounded-full border-2 border-gray-200 shadow-sm mb-2 bg-gray-100 flex items-center justify-center text-3xl">
                            👤
                        </div>

                        <h6 class="font-black text-gray-800 text-center uppercase leading-tight">{{t.nombres}}</h6>
                        <p class="text-xs text-gray-500 text-center mt-1 uppercase font-medium mb-3">{{t.apellidos}}</p>

                        <div
                            class="w-32 h-32 bg-white p-1 border border-gray-200 rounded-lg flex items-center justify-center">
                            <img [src]="baseStorageUrl + 'qrcodes/' + t.dni + '.svg'" alt="QR de {{ t.nombres }}"
                                class="w-full h-full object-contain">
                        </div>
                    </div>

                    <div class="bg-green-950 text-white text-center py-2 mt-auto">
                        <span class="block text-xs tracking-wider opacity-80">DNI: {{t.dni}}</span>
                        <span class="block text-sm font-bold uppercase">{{t.area || 'PERSONAL'}}</span>
                    </div>
                </div>

            </div>

            <div *ngIf="lista.length === 0" class="col-span-full text-center py-12 text-gray-500 no-print">
                No hay trabajadores registrados aún.
            </div>
        </div>
    </div>
</div>
