<div class="w-full">

    <div class="flex items-center justify-between mb-8 no-print">
        <div>
            <h1 class="text-2xl font-black text-gray-800 tracking-tight">Control de Personal</h1>
            <p class="text-sm text-gray-500 mt-1">Registro de trabajadores y generación de Fotochecks QR</p>
        </div>
        <button (click)="imprimir()"
            class="bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded-lg font-bold shadow-sm transition-colors flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z">
                </path>
            </svg>
            Imprimir Todo
        </button>
    </div>

    <div class="flex flex-col lg:flex-row gap-8">

        <div class="w-full lg:w-1/3 no-print">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 sticky top-6">
                <h4 class="text-lg font-bold text-green-700 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z">
                        </path>
                    </svg>
                    Nuevo Personal
                </h4>
                <hr class="border-gray-100 mb-4">

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">DNI</label>
                        <input type="text" [(ngModel)]="form.dni" maxlength="8" placeholder="Ej. 12345678"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all">
                    </div>
                    <div>
                        <label
                            class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Nombres</label>
                        <input type="text" [(ngModel)]="form.nombres" placeholder="Ej. Juan Carlos"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all uppercase">
                    </div>
                    <div>
                        <label
                            class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Apellidos</label>
                        <input type="text" [(ngModel)]="form.apellidos" placeholder="Ej. Pérez Gómez"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all uppercase">
                    </div>
                    <div>
                        <label
                            class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Género</label>
                        <select [(ngModel)]="form.genero"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all bg-white">
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                        </select>
                    </div>

                    <button (click)="guardar()"
                        class="w-full mt-2 bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 px-4 rounded-lg shadow-md transition-colors flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4">
                            </path>
                        </svg>
                        Registrar y Generar QR
                    </button>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-2/3 print-container">
            <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 auto-rows-max">

                <div *ngFor="let t of lista" class="fotocheck-wrapper">
                    <div
                        class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow flex flex-col h-[380px] w-[260px] mx-auto print-card">

                        <div
                            class="bg-gray-50 border-b-[3px] border-green-700 p-3 flex justify-center items-center h-16">
                            <span class="font-black text-lg tracking-widest text-green-900">AMAZON NUTS</span>
                        </div>

                        <div class="flex flex-col items-center pt-4 px-4">
                            <img [src]="t.genero === 'M' ? 'assets/img/avatar-m.png' : 'assets/img/avatar-f.png'"
                                class="w-16 h-16 rounded-full border-2 border-gray-200 shadow-sm mb-2" alt="Avatar">
                            <h6 class="font-black text-gray-800 text-center uppercase leading-tight">{{t.nombres}}</h6>
                            <p class="text-xs text-gray-500 text-center mt-1 uppercase font-medium">{{t.apellidos}}</p>
                        </div>

                        <div class="mt-auto mb-4 mx-auto bg-white p-2 border border-gray-100 rounded-lg shadow-inner">
                            <img [src]="'http://localhost:8000/storage/' + t.qr_code"
                                class="w-[100px] h-[100px] object-contain mix-blend-multiply" alt="QR Code">
                        </div>

                        <div class="bg-green-950 text-white text-center py-2 mt-auto">
                            <span class="text-xs font-bold tracking-[0.2em]">DNI: {{t.dni}}</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
