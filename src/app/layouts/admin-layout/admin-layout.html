<div class="flex h-screen w-full bg-gray-50 overflow-hidden">

    @if (drawerOpen) {
    <div class="fixed inset-0 bg-black/50 z-20 lg:hidden backdrop-blur-sm transition-opacity" (click)="toggleDrawer()">
    </div>
    }

    <aside
        class="fixed inset-y-0 left-0 z-30 w-64 bg-green-950 text-white flex flex-col shadow-2xl transition-transform duration-300 lg:static lg:translate-x-0"
        [ngClass]="drawerOpen ? 'translate-x-0' : '-translate-x-full'">

        <div class="h-16 flex items-center justify-center border-b border-green-800 bg-green-900 flex-shrink-0">
            <span class="font-black text-xl tracking-widest text-white">AMAZON NUTS</span>
        </div>

        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2">
            <a *ngFor="let item of menuItems" [routerLink]="item.path"
                routerLinkActive="bg-green-800 text-white shadow-md" (click)="drawerOpen = false"
                class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-green-700 hover:text-white transition-all font-medium">

                <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon"></path>
                </svg>

                <span>{{ item.title }}</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">

        <header
            class="h-16 bg-white border-b border-gray-100 shadow-sm flex items-center justify-between px-4 lg:px-8 z-10 shrink-0">

            <button (click)="toggleDrawer()" class="lg:hidden p-2 text-gray-500 hover:text-green-700 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <div class="hidden lg:block"></div>

            <div class="flex items-center gap-4 lg:gap-6">

                <button class="relative p-2 text-gray-400 hover:text-green-700 transition-colors">
                    <i class="bi bi-bell-fill text-xl"></i>
                    <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
                </button>

                <div class="h-6 w-px bg-gray-200 hidden sm:block"></div>

                <div class="flex items-center gap-3">
                    <div class="hidden sm:block text-right">
                        <p class="text-sm font-bold text-gray-700 leading-none">{{ usuarioLogueado }}</p>
                        <p class="text-xs text-gray-400 mt-1">Administrador</p>
                    </div>

                    <div
                        class="w-9 h-9 rounded-full bg-green-100 border border-green-200 text-green-700 flex items-center justify-center font-bold shadow-sm">
                        {{ usuarioLogueado.charAt(0) | uppercase }}
                    </div>

                    <button (click)="cerrarSesion()"
                        class="text-red-400 hover:text-red-600 p-1.5 rounded-md hover:bg-red-50 transition-colors flex items-center gap-2"
                        title="Cerrar Sesión">
                        <span class="hidden md:inline text-sm font-medium">Salir</span>
                        <i class="bi bi-box-arrow-right text-lg"></i>
                    </button>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-auto bg-gray-50 print:bg-white relative">
            <router-outlet></router-outlet>
        </div>

    </main>
</div>
