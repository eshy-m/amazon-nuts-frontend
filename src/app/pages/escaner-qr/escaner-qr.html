<div class="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-4 relative overflow-hidden">

    <div class="text-center z-10 w-full">
        <h1 class="text-7xl md:text-9xl font-black text-white tracking-wider drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)]">
            {{ horaActual | date:'HH:mm:ss' }}
        </h1>
        <p class="text-xl md:text-3xl text-green-400 font-bold uppercase tracking-widest mt-2">
            {{ horaActual | date:'dd MMM yyyy' }}
        </p>
    </div>

    <div class="relative w-full max-w-md mt-1 z-10">

        <div
            class="absolute inset-0 border-4 border-green-500 rounded-3xl shadow-[0_0_40px_rgba(34,197,94,0.4)] pointer-events-none z-20">
        </div>
        <div class="absolute inset-0 border-4 border-transparent rounded-3xl z-30 pointer-events-none border-t-green-300 border-b-green-300 animate-pulse"
            *ngIf="!procesando"></div>

        <div class="rounded-3xl overflow-hidden bg-black aspect-square flex items-center justify-center relative z-10">
            <zxing-scanner *ngIf="!procesando && !mensajeErrorCamara" [enable]="!procesando"
                (scanSuccess)="onCodeResult($event)" (scanError)="manejarErrorCamara($event)"
                class="w-full h-full object-cover">
            </zxing-scanner>

            <div *ngIf="mensajeErrorCamara"
                class="absolute inset-0 bg-red-900/80 flex flex-col items-center justify-center p-6 text-center z-30 backdrop-blur-md">
                <i class="bi bi-camera-video-off text-5xl text-white mb-4 animate-bounce"></i>
                <p class="text-white font-bold text-xl">{{ mensajeErrorCamara }}</p>
            </div>
        </div>
    </div>

    <div class="w-full max-w-md mt-6 z-10 flex gap-2">
        <input type="text" [(ngModel)]="dniManual" (keyup.enter)="registrarManual()"
            placeholder="O ingresa DNI manualmente..."
            class="flex-1 bg-gray-800/80 text-white border-2 border-gray-700 focus:border-green-500 rounded-xl px-4 py-3 text-center text-xl font-bold tracking-widest outline-none transition-colors placeholder:text-gray-500 placeholder:text-sm placeholder:font-normal placeholder:tracking-normal backdrop-blur-sm">

        <button (click)="registrarManual()" [disabled]="procesando || !dniManual"
            class="bg-green-600 hover:bg-green-500 disabled:bg-gray-700 disabled:text-gray-500 disabled:shadow-none text-white font-bold py-3 px-6 rounded-xl transition-all shadow-[0_0_15px_rgba(34,197,94,0.3)] hover:shadow-[0_0_25px_rgba(34,197,94,0.5)]">
            <i class="bi bi-send-fill text-xl"></i>
        </button>
    </div>

    <div *ngIf="resultadoRegistro"
        class="absolute bottom-12 left-1/2 transform -translate-x-1/2 w-[90%] max-w-lg p-6 rounded-3xl shadow-2xl text-center z-50 transition-all duration-300"
        [ngClass]="resultadoRegistro.exito ? 'bg-green-600 shadow-[0_0_40px_rgba(22,163,74,0.6)]' : 'bg-red-600 shadow-[0_0_40px_rgba(220,38,38,0.6)]'">

        <div class="text-white">
            <svg *ngIf="resultadoRegistro.exito" class="w-16 h-16 mx-auto mb-2 text-white" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <svg *ngIf="!resultadoRegistro.exito" class="w-16 h-16 mx-auto mb-2 text-white" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>

            <h2 class="text-3xl font-black mb-1 uppercase tracking-wider">{{ resultadoRegistro.mensaje }}</h2>

            <div *ngIf="resultadoRegistro.datos" class="mt-4 bg-black/20 rounded-2xl p-4 border border-white/20">
                <p class="text-2xl font-bold">{{ resultadoRegistro.datos.nombres }}</p>
                <div
                    class="mt-2 inline-block px-4 py-1 rounded-full bg-white text-black font-black text-sm uppercase tracking-widest">
                    ESTADO: {{ resultadoRegistro.datos.estado }}
                </div>
            </div>
        </div>
    </div>

    <div class="absolute bottom-4 text-gray-600 text-xs font-bold tracking-widest uppercase z-0">
        AMAZON NUTS - CONTROL DE ASISTENCIA
    </div>
</div>
