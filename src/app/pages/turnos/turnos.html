<div class="p-4 sm:p-6 lg:p-8 w-full max-w-7xl mx-auto flex flex-col lg:flex-row gap-6">

    <div class="w-full lg:w-1/3">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="bg-green-900 px-6 py-4">
                <h5 class="text-white font-bold text-lg flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                    </svg>
                    Programar Turno
                </h5>
            </div>

            <div class="p-6">
                <form [formGroup]="turnoForm" (ngSubmit)="guardarTurno()" class="space-y-4">

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Área de Trabajo</label>
                        <select formControlName="area"
                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-green-600 outline-none transition-all text-sm">
                            <option value="">Seleccione un área...</option>
                            <option *ngFor="let area of areas" [value]="area">{{ area }}</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Fecha de la Jornada</label>
                        <input type="date" formControlName="fecha"
                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-green-600 outline-none transition-all text-sm">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Entrada</label>
                            <input type="time" formControlName="hora_entrada"
                                class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-green-600 outline-none transition-all text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Salida</label>
                            <input type="time" formControlName="hora_salida"
                                class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-green-600 outline-none transition-all text-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Tolerancia (Minutos)</label>
                        <input type="number" formControlName="tolerancia_minutos"
                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-green-600 outline-none transition-all text-sm">
                    </div>

                    <button type="submit" [disabled]="turnoForm.invalid"
                        class="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed mt-4 flex items-center justify-center gap-2">
                        Guardar Programación
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="w-full lg:w-2/3">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden h-full">
            <div class="bg-white px-6 py-5 border-b border-gray-100 flex items-center justify-between">
                <h5 class="text-gray-800 font-black text-lg tracking-wide">Turnos Programados</h5>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-gray-600">
                    <thead class="bg-gray-50 text-gray-500 uppercase text-xs font-bold tracking-wider">
                        <tr>
                            <th class="px-6 py-4">Fecha</th>
                            <th class="px-6 py-4">Área</th>
                            <th class="px-6 py-4">Ingreso</th>
                            <th class="px-6 py-4">Salida</th>
                            <th class="px-6 py-4 text-center">Estado</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <tr *ngFor="let turno of turnos" class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4 font-medium text-gray-900">{{ turno.fecha | date:'dd/MM/yyyy' }}</td>
                            <td class="px-6 py-4 font-bold text-green-800">{{ turno.area }}</td>
                            <td class="px-6 py-4">{{ turno.hora_entrada }}</td>
                            <td class="px-6 py-4">{{ turno.hora_salida }}</td>
                            <td class="px-6 py-4 text-center">
                                <span class="px-3 py-1.5 text-[10px] uppercase font-black tracking-wider rounded-full"
                                    [ngClass]="turno.estado === 'Activo' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-gray-100 text-gray-500 border border-gray-200'">
                                    {{ turno.estado }}
                                </span>
                            </td>
                        </tr>
                        <tr *ngIf="turnos.length === 0">
                            <td colspan="5" class="px-6 py-12 text-center text-gray-400 font-medium">
                                <svg class="w-12 h-12 mx-auto text-gray-300 mb-3" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                No hay turnos programados en el sistema.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
