<div class="p-4 md:p-8 bg-gray-100 min-h-screen flex flex-col items-center justify-center">

    <div *ngIf="cargando" class="text-xl text-gray-500 font-bold animate-pulse">Buscando Lote Activo...</div>

    <div *ngIf="!cargando && !loteActivo"
        class="bg-red-100 border-2 border-red-500 text-red-700 p-8 rounded-3xl text-center shadow-lg max-w-lg w-full">
        <h2 class="text-3xl font-black mb-2">🚫 Sin Lote Activo</h2>
        <p class="text-lg">El Ingeniero aún no ha iniciado la tarea del día. Esperando apertura...</p>
    </div>

    <div *ngIf="!cargando && loteActivo" class="w-full max-w-2xl bg-white p-6 md:p-10 rounded-[2.5rem] shadow-2xl">

        <div class="text-center mb-8 border-b-2 border-dashed border-gray-200 pb-6">
            <p class="text-sm font-bold text-gray-400 uppercase tracking-widest">Lote en Proceso</p>
            <h1 class="text-3xl font-black text-gray-800">Día: {{ loteActivo.fecha }}</h1>
            <p class="text-lg text-blue-600 font-bold mt-2">PRIMERA ETAPA</p>
        </div>

        <h3 class="text-xl font-black text-center mb-4 text-gray-700">1. ¿Qué vas a pesar?</h3>
        <div class="grid grid-cols-3 gap-3 md:gap-4 mb-8">
            <button (click)="seleccionarCategoria('Primera')"
                [ngClass]="categoriaSeleccionada === 'Primera' ? 'bg-green-600 text-white scale-105 shadow-xl ring-4 ring-green-300' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                class="py-6 rounded-2xl font-black text-xl md:text-2xl transition-all duration-200">
                PRIMERA
            </button>
            <button (click)="seleccionarCategoria('Partida')"
                [ngClass]="categoriaSeleccionada === 'Partida' ? 'bg-orange-500 text-white scale-105 shadow-xl ring-4 ring-orange-300' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                class="py-6 rounded-2xl font-black text-xl md:text-2xl transition-all duration-200">
                PARTIDA
            </button>
            <button (click)="seleccionarCategoria('Ojos')"
                [ngClass]="categoriaSeleccionada === 'Ojos' ? 'bg-red-600 text-white scale-105 shadow-xl ring-4 ring-red-300' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                class="py-6 rounded-2xl font-black text-xl md:text-2xl transition-all duration-200">
                OJOS
            </button>
        </div>

        <h3 class="text-xl font-black text-center mb-4 text-gray-700">2. Ingresa los Kilos</h3>
        <div class="relative w-full max-w-xs mx-auto mb-10">
            <input type="number" [(ngModel)]="pesoIngresado" placeholder="0.00"
                class="w-full text-center text-5xl font-black py-4 border-4 rounded-3xl focus:outline-none focus:ring-0 focus:border-blue-600 transition-colors"
                [ngClass]="categoriaSeleccionada ? 'border-blue-400 bg-blue-50 text-blue-900' : 'border-gray-200 bg-gray-50 text-gray-400'"
                [disabled]="!categoriaSeleccionada">
            <span class="absolute right-6 top-1/2 -translate-y-1/2 text-2xl font-bold text-gray-400">KG</span>
        </div>

        <button (click)="guardarPesaje()" [disabled]="guardando || !categoriaSeleccionada || !pesoIngresado"
            class="w-full py-6 rounded-2xl font-black text-3xl shadow-lg transition-transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed"
            [ngClass]="categoriaSeleccionada ? 'bg-blue-600 hover:bg-blue-700 text-white' : 'bg-gray-300 text-gray-500'">
            {{ guardando ? 'GUARDANDO...' : 'REGISTRAR PESO' }}
        </button>

    </div>
</div>
