<div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-emerald-50 flex items-center justify-center p-6">

    <div
        class="max-w-md w-full bg-white rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.05)] overflow-hidden border border-slate-100">

        <div class="p-10 pb-6 text-center">
            <div
                class="w-20 h-20 bg-emerald-600 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-emerald-200 rotate-3">
                <span class="text-white text-4xl font-black italic">A</span>
            </div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight">Amazon Nuts</h2>
            <p class="text-slate-400 font-medium mt-2">Sistema Interno de Gestión B2B</p>
        </div>

        @if (mensajeError) {
        <div
            class="mx-10 mb-4 p-4 bg-rose-50 border border-rose-100 text-rose-600 rounded-xl text-sm font-bold flex items-center gap-3 animate-bounce">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd"
                    d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                    clip-rule="evenodd" />
            </svg>
            {{ mensajeError }}
        </div>
        }

        <form [formGroup]="loginForm" (ngSubmit)="iniciarSesion()" class="p-10 pt-2 space-y-6">

            <div class="space-y-2">
                <label class="text-xs font-black uppercase tracking-widest text-slate-500 ml-1">Identificación</label>
                <div class="relative group">
                    <div
                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-emerald-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <input type="text" formControlName="login"
                        class="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-200 outline-none focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 bg-slate-50/50 focus:bg-white transition-all text-slate-700 font-medium"
                        placeholder="Ej: OPERARIO">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-black uppercase tracking-widest text-slate-500 ml-1">Contraseña</label>
                <div class="relative group">
                    <div
                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-emerald-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 11-8 0v4h8z" />
                        </svg>
                    </div>
                    <input type="password" formControlName="password"
                        class="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-200 outline-none focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 bg-slate-50/50 focus:bg-white transition-all text-slate-700 font-medium"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" [disabled]="cargando"
                class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-300 text-white font-black rounded-2xl shadow-xl shadow-emerald-200 hover:shadow-emerald-300 transform hover:-translate-y-0.5 active:scale-95 transition-all flex items-center justify-center gap-3">

                @if (cargando) {
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                AUTENTICANDO...
                } @else {
                INGRESAR AL PANEL
                }
            </button>
        </form>

        <div class="p-8 bg-slate-50 border-t border-slate-100 text-center">
            <p class="text-xs text-slate-400 font-bold uppercase tracking-tighter">
                &copy; 2026 Amazon Nuts S.A.C - Puerto Maldonado
            </p>
        </div>
    </div>
</div>
