<div class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">

        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-800">Amazon Nuts</h2>
            <p class="text-gray-500 mt-2">Panel de Administración B2B</p>
        </div>

        @if (mensajeError) {
        <div class="mb-6 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm text-center">
            {{ mensajeError }}
        </div>
        }

        <form [formGroup]="loginForm" (ngSubmit)="iniciarSesion()" class="space-y-6">

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Correo Electrónico</label>
                <input type="email" formControlName="email"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none bg-gray-50 focus:bg-white"
                    placeholder="admin@amanuts.pe">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Contraseña</label>
                <input type="password" formControlName="password"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none bg-gray-50 focus:bg-white"
                    placeholder="••••••••">
            </div>

            <button type="submit" [disabled]="cargando"
                class="w-full px-8 py-4 bg-green-600 hover:bg-green-700 disabled:bg-gray-400 text-white font-bold rounded-lg shadow-lg transition-all">
                {{ cargando ? 'Verificando...' : 'Ingresar al Panel' }}
            </button>

        </form>

        <div class="mt-6 text-center text-sm text-gray-400">
            <p>Acceso restringido solo para personal autorizado.</p>
        </div>
    </div>
</div>
